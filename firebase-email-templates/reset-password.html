<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset your KeroMovie password</title>
</head>
<body style="margin:0;padding:0;font-family:'Inter',Arial,sans-serif;background:#0a0a0a;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0a0a0a;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="560" cellpadding="0" cellspacing="0" style="border-radius:16px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.6);">

          <!-- Header -->
          <tr>
            <td style="background-image:url('https://keromovie.vercel.app/emailbackground.png');background-size:cover;background-position:center;background-color:#1a0a0a;padding:48px 40px 36px;text-align:center;">
              <div style="background:rgba(0,0,0,0.55);padding:32px;border-radius:12px;display:inline-block;width:100%;box-sizing:border-box;">
                <img src="https://keromovie.vercel.app/keromovielogo.png" alt="KeroMovie" width="52" style="display:block;margin:0 auto 14px;" />
                <p style="margin:0;font-size:1.5rem;font-weight:900;letter-spacing:-0.01em;color:#fff;">
                  Kero<span style="color:#e74c3c;">Movie</span>
                </p>
              </div>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="background:#111118;padding:40px 40px 32px;">
              <h1 style="margin:0 0 12px;font-size:1.5rem;font-weight:800;color:#fff;">Reset your password</h1>
              <p style="margin:0 0 24px;font-size:0.95rem;line-height:1.65;color:rgba(255,255,255,0.65);">
                We received a request to reset your password. Click the button below to choose a new one. If you didn't request this, you can safely ignore this email.
              </p>
              <table cellpadding="0" cellspacing="0">
                <tr>
                  <td style="border-radius:999px;background:#e74c3c;box-shadow:0 4px 18px rgba(231,76,60,0.45);">
                    <a href="{{ link }}" target="_blank" style="display:inline-block;padding:14px 36px;font-size:0.9rem;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;color:#fff;text-decoration:none;">
                      Reset Password
                    </a>
                  </td>
                </tr>
              </table>
              <p style="margin:24px 0 0;font-size:0.78rem;color:rgba(255,255,255,0.3);">
                This link expires in 1 hour.
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#0d0d14;padding:20px 40px;text-align:center;border-top:1px solid rgba(255,255,255,0.06);">
              <p style="margin:0;font-size:0.72rem;color:rgba(255,255,255,0.2);">© KeroMovie · designed by claire</p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
